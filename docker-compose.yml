services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: emberstream
      POSTGRES_PASSWORD: emberstream
      POSTGRES_DB: emberstream
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emberstream"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://emberstream:emberstream@postgres:5432/emberstream
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDER: ${LLM_PROVIDER:-none}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      ENVIRONMENT: dev
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"

volumes:
  pgdata:
